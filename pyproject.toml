[tool.ruff]
# Target Python version.
target-version = "py39"
line-length = 100

[tool.ruff.lint]
# Enable standard rules
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # Pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade (enforces modern python syntax)
    "ARG",  # flake8-unused-arguments
]
ignore = ["E501"]

# Exclude typical development directories
exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    "build",
    "dist",
    "venv",
]

[tool.ruff.lint.per-file-ignores]
# Relax annotation and check rules for tests to keep test writing clean
"tests/**/*.py" = ["ARG001", "ARG002"]

[tool.mypy]
# Enforce strict static typing checks
python_version = "3.10"
strict = true
warn_unreachable = false
warn_unused_ignores = false
pretty = true

# Ignore missing imports for third-party libraries that lack PEP 561 compliance
[[tool.mypy.overrides]]
module = [
    "transformers.*",
    "evaluate.*",
    "datasets.*",
    "torch.*",
    "openai.*",
    "setuptools.*",
]
ignore_missing_imports = true
